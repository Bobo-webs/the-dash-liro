<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>View & Edit - Admin</title>

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://dashliro.vercel.app/">
    <meta property="og:title" content="DashLiro - Reliable. Fast. Secure Delivery.">
    <meta property="og:description"
        content="Deliver smarter with DashLiro. Fast, secure, and real-time tracked deliveries for parcels, bulk freight, and more.">
    <meta property="og:image" content="https://dashliro.vercel.app/assets/images/dashliro-brand.png">
    <meta property="og:site_name" content="DashLiro">

    <!-- Favicon setup -->
    <link rel="icon" type="image/jpeg" href="./assets/images/logo.jpg">
    <link rel="shortcut icon" href="./assets/images/logo.jpg" type="image/x-icon">
    <link rel="apple-touch-icon" href="./assets/images/logo.jpg">

    <!-- styling -->
    <link rel="stylesheet" href="/assets/css/admin.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Firebase -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.1/firebase-database.js"></script>
    <script type="module" src="/assets/js/view-edit.js"></script>
</head>

<body>

    <!-- Loading Overlay -->
    <div id="loading-overlay">
        <div class="loader"></div>
    </div>

    <div class="container" id="dashboard-content" style="display: none;">
        <div class="navigation">
            <ul>
                <li>
                    <a href="admin.html">
                        <span class="icon">
                            <img src="/assets/images/logo.png" alt="">
                        </span>
                        <span class="title brand">Admin</span>
                    </a>
                </li>

                <li>
                    <a href="admin.html">
                        <span class="icon"><i class="fa-solid fa-truck"></i></span>
                        <span class="title">Create</span>
                    </a>
                </li>

                <li class="active-link">
                    <a href="view-edit.html">
                        <span class="icon"><i class="fa-solid fa-pen-to-square"></i></span>
                        <span class="title">View & Edit</span>
                    </a>
                </li>

                <li>
                    <a href="mailer.html">
                        <span class="icon"><i class="fa-solid fa-envelope"></i></span>
                        <span class="title">Mailer</span>
                    </a>
                </li>

                <li>
                    <a id="logoutButton">
                        <span class="icon"><i class="fa-solid fa-right-from-bracket"></i></span>
                        <span class="title">Sign Out</span>
                    </a>
                </li>
            </ul>
        </div>

        <!-- ================= Main ================= -->
        <div class="main">
            <div class="topbar">
                <div></div>
                <div class="toggle"><img src="/assets/images/menu.png" alt=""></div>
                <div class="home"><a href="index.html"><i class="fa-solid fa-home"></i></a></div>
            </div>

            <!-- ================= View Section ================= -->

            <!-- ================= Search & Filter Section ================= -->
            <div class="search-filter-container">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="Search by Name or Tracking ID..."
                        autocomplete="off" />
                    <button id="searchClearBtn"><i class="fa-solid fa-xmark"></i></button>
                    <span class="search-icon"><i class="fa-solid fa-magnifying-glass"></i></span>
                </div>
            </div>

            <h2 style="color: var(--pry-color); text-align: center; margin-bottom: 2rem;"><i
                    class="fa-solid fa-file-lines"></i> Existing Tracking Details</h2>
            <div class="table-container tracking-table-container">
                <table class="tracking-table">
                    <thead>
                        <tr>
                            <th>Actions</th>
                            <th>Receiver Name</th>
                            <th>Tracking ID</th>
                            <th>Address</th>
                            <th>Dispatch Date</th>
                            <th>Delivery Date</th>
                            <th>Status</th>
                            <th>Package Summary</th>
                            <th>Progress (Location / Date / Time)</th>
                        </tr>
                    </thead>
                    <tbody id="trackingTableBody">
                        <!-- rows inserted dynamically -->
                    </tbody>
                </table>
            </div>



            <!-- ================= Edit Section ================= -->
            <!-- ================= Tracking Section ================= -->
            <section class="admin-tracking">
                <h2><i class="fa-solid fa-pen-to-square"></i> Edit Package Tracking</h2>
                <div class="tracking-form-container">

                    <form id="trackingForm" class="tracking-form" autocomplete="off">

                        <div class="form-group">
                            <label for="trackingId">Tracking ID</label>
                            <input type="text" id="trackingId" readonly placeholder="Uneditable" />
                        </div>

                        <div class="form-group">
                            <label for="receiverName">Receiver Name</label>
                            <input type="text" id="receiverName" required placeholder="Enter receiver name" />
                        </div>

                        <div class="form-group">
                            <label for="receiverAddress">Receiver Address</label>
                            <textarea id="receiverAddress" required placeholder="Enter receiver address"></textarea>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="dispatchDate">Dispatch Date</label>
                                <input type="date" id="dispatchDate" required />
                            </div>

                            <div class="form-group">
                                <label for="deliveryDate">Estimated Delivery</label>
                                <input type="date" id="deliveryDate" required />
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="packageSummary">Package Summary</label>
                            <textarea id="packageSummary" rows="3"
                                placeholder="e.g. Vehicle – Enclosed Transport, Confidential Documents"></textarea>
                        </div>

                        <div class="progress-inputs">
                            <div class="form-group">
                                <label for="currentStatus">Select Status</label>
                                <select id="currentStatus" required>
                                    <option value="" disabled selected>Select status</option>
                                    <option value="Dispatch Received">Dispatch Received</option>
                                    <option value="Quality Control">Quality Control</option>
                                    <option value="Ready to Ship">Ready to Ship</option>
                                    <option value="In Transit">In Transit</option>
                                    <option value="Out for Delivery">Out for Delivery</option>
                                    <option value="Delivered">Delivered</option>
                                </select>
                            </div>

                            <div class="form-row small">
                                <div class="form-group">
                                    <label for="progressLocation">Location</label>
                                    <input type="text" id="progressLocation" placeholder="e.g. JFK Cargo Facility" />
                                </div>

                                <div class="form-group">
                                    <label for="progressDate">Date</label>
                                    <input type="date" id="progressDate" />
                                </div>

                                <div class="form-group">
                                    <label for="progressTime">Time</label>
                                    <input type="time" id="progressTime" />
                                </div>
                            </div>
                        </div>

                        <div class="form-actions">
                            <button type="submit" class="save-btn">Update Tracking</button>
                            <button type="button" id="resetFormBtn" class="secondary-btn">Reset</button>
                        </div>
                    </form>
                </div>
            </section>


            <!-- ========================== Popups ====================== -->
            <div class="popup-overlay" id="popupOverlay"></div>
            <div id="confirmationPopup" class="popup">
                <div class="popup-content">
                    <h3>Logout</h3>
                    <span id="confirmationMessage">Are you sure you want to log out?</span>
                    <div class="popup-buttons">
                        <button id="confirmNo" class="confirm-button">Cancel</button>
                        <button id="confirmYes" class="confirm-button">Confirm</button>
                    </div>
                </div>
            </div>

            <div id="popup" class="popup">
                <span id="popup-message"></span>
                <span class="close-popup">&times;</span>
            </div>

            <script>
                // ============== Toggle Navigation
                let toggle = document.querySelector(".toggle");
                let navigation = document.querySelector(".navigation");
                let main = document.querySelector(".main");
                toggle.onclick = function () {
                    navigation.classList.toggle("active");
                    main.classList.toggle("active");
                };

                // ============== Popup
                window.onclick = function (event) {
                    const popup = document.getElementById('popup');
                    if (event.target === popup) popup.style.display = 'none';
                }
                document.querySelector('.close-popup').onclick = function () {
                    document.getElementById('popup').style.display = 'none';
                }

                // ============== search filter
                const searchInput = document.getElementById("searchInput");
                const searchClearBtn = document.getElementById("searchClearBtn");
                const tableBody = document.getElementById("trackingTableBody");

                searchInput.addEventListener("input", () => {
                    const filter = searchInput.value.trim().toLowerCase();
                    const rows = tableBody.querySelectorAll("tr");

                    rows.forEach((row) => {
                        const receiverCell = row.querySelector("td:nth-child(2)");
                        const trackingIdCell = row.querySelector("td:nth-child(3)");

                        if (!receiverCell || !trackingIdCell) return;

                        const receiverName = receiverCell.textContent.toLowerCase();
                        const trackingId = trackingIdCell.textContent.toLowerCase();

                        // Match receiver or tracking ID
                        if (receiverName.includes(filter) || trackingId.includes(filter)) {
                            row.style.display = "";
                        } else {
                            row.style.display = "none";
                        }
                    });
                });

                searchClearBtn.addEventListener("click", () => {
                    searchInput.value = "";
                    const rows = tableBody.querySelectorAll("tr");
                    rows.forEach((row) => (row.style.display = ""));
                });

            </script>
</body>

</html>
